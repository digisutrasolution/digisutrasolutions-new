# Caddy site block for https://digisutrasolutions.com
#
# This server already runs Caddy (docker-setup-caddy-1) owning :80 and :443
# for n8n, aigrowth and friends. DO NOT install nginx — it would fight Caddy
# for those ports and take every existing site down.
#
# Append this block to the existing Caddyfile, then reload WITHOUT restarting
# the container (a reload cannot drop the other sites):
#   docker exec docker-setup-caddy-1 caddy reload --config /etc/caddy/Caddyfile
#
# The app is reached over the Docker network by container name, so it needs no
# published host port at all and cannot collide with anything already bound.

digisutrasolutions.com, www.digisutrasolutions.com {
	# Single canonical origin: everything lands on the apex.
	@www host www.digisutrasolutions.com
	redir @www https://digisutrasolutions.com{uri} permanent

	encode zstd gzip

	reverse_proxy digisutra-prod-app-1:3000 {
		# WHY: the app rate-limits per IP and reads the FIRST X-Forwarded-For
		# entry (lib/rate-limit.ts clientIp). Behind Cloudflare the socket peer
		# is a Cloudflare edge IP, so without this every visitor shares one
		# bucket and the bot (25/10min) and tool (10/10min) limits would lock
		# out the whole site at once. CF-Connecting-IP is always the real
		# visitor when traffic arrives through the orange cloud.
		header_up X-Forwarded-For {http.request.header.CF-Connecting-IP}
		header_up X-Forwarded-Proto https
	}
}

# ---------------------------------------------------------------------------
# TLS notes
#
# Caddy issues and renews a Let's Encrypt certificate automatically, and the
# HTTP-01 challenge still works through Cloudflare's proxy because Cloudflare
# forwards :80 to the origin. Pair it with Cloudflare SSL/TLS = Full (strict).
#
# If issuance ever fails (for example if you firewall :80 to Cloudflare ranges
# only, or turn on Under Attack mode during setup), use a Cloudflare Origin
# Certificate instead — paste the cert and key on the server and swap the
# block above to:
#
#   digisutrasolutions.com, www.digisutrasolutions.com {
#       tls /etc/caddy/certs/digisutra-origin.pem /etc/caddy/certs/digisutra-origin.key
#       ...
#   }
#
# Never set Cloudflare to "Flexible": Cloudflare would speak HTTP to the origin
# while telling browsers the connection is secure, and the app's https-based
# redirects would loop.
# ---------------------------------------------------------------------------
