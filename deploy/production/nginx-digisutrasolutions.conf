# nginx vhost for https://digisutrasolutions.com  (origin behind Cloudflare)
#
#   install: /etc/nginx/sites-available/digisutrasolutions.com
#   enable:  ln -s /etc/nginx/sites-available/digisutrasolutions.com \
#                  /etc/nginx/sites-enabled/
#   test:    nginx -t && systemctl reload nginx
#
# Change APP_PORT below if 3200 is taken by another app on this server.

# ---------------------------------------------------------------------------
# Real visitor IP.
#
# WHY THIS MATTERS: the app rate-limits per IP and reads the FIRST entry of
# X-Forwarded-For (lib/rate-limit.ts clientIp). Behind Cloudflare, $remote_addr
# is a Cloudflare edge IP — without this block every visitor shares one bucket
# and the bot (25/10min) and tool (10/10min) limits lock out the whole site at
# once. Restoring the real IP also keeps the first-party analytics honest.
#
# Refresh these ranges occasionally: https://www.cloudflare.com/ips/
# ---------------------------------------------------------------------------
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    listen [::]:80;
    server_name digisutrasolutions.com www.digisutrasolutions.com;

    # Certbot's HTTP-01 challenge must stay reachable on :80.
    location /.well-known/acme-challenge/ { root /var/www/html; }

    location / { return 301 https://digisutrasolutions.com$request_uri; }
}

# www -> apex, so the site has exactly one canonical origin.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.digisutrasolutions.com;

    ssl_certificate     /etc/letsencrypt/live/digisutrasolutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/digisutrasolutions.com/privkey.pem;

    return 301 https://digisutrasolutions.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name digisutrasolutions.com;

    ssl_certificate     /etc/letsencrypt/live/digisutrasolutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/digisutrasolutions.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    # Uploaded media and the Next build are already fingerprinted/immutable;
    # everything else is server-rendered, so let the app decide.
    client_max_body_size 25m;

    # The app emits its own security headers (next.config.ts). Only add what
    # nginx is better placed to do.
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;

        # $proxy_add_x_forwarded_for appends $remote_addr, which real_ip has
        # already rewritten to the true visitor — so the FIRST entry is the
        # visitor, which is exactly what clientIp() reads.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Host $host;

        # Next.js dev/HMR and any future streaming responses.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}
