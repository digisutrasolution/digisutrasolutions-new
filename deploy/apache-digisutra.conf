# Apache vhost for the DigiSutra staging site (subdomain form — recommended).
# Place at /etc/apache2/sites-available/digisutra.conf, then:
#   a2enmod proxy proxy_http headers
#   a2ensite digisutra
#   systemctl reload apache2
#   certbot --apache -d digisutra.iqinfotech.co.in
#
# Requires a DNS A record: digisutra.iqinfotech.co.in -> this server's IP.
# Adjust the port if APP_PORT in the compose .env differs.

<VirtualHost *:80>
    ServerName digisutra.iqinfotech.co.in

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:3105/
    ProxyPassReverse / http://127.0.0.1:3105/

    # Belt-and-braces: the app also serves noindex when SITE_NOINDEX=1.
    Header set X-Robots-Tag "noindex, nofollow"

    ErrorLog ${APACHE_LOG_DIR}/digisutra-error.log
    CustomLog ${APACHE_LOG_DIR}/digisutra-access.log combined
</VirtualHost>

# certbot --apache will clone this into an :443 vhost with SSL directives.
