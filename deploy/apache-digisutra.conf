# DigiSutra staging under a SUBPATH of the existing pbx vhost.
# The app itself serves with basePath /inhouse/digisutrasolutions.com
# (derived from SITE_URL), so Apache forwards the path unchanged.
#
# 1. Find the active vhost:   apache2ctl -S | grep pbx
# 2. Add the block below INSIDE the <VirtualHost *:443> for
#    pbx.iqinfotech.co.in (and optionally the :80 one).
# 3. a2enmod proxy proxy_http headers && systemctl reload apache2
#
# NOTE: if that vhost has RewriteRules that catch /inhouse/*, add
#   RewriteCond %{REQUEST_URI} !^/inhouse/digisutrasolutions.com
# above them.

    ProxyPreserveHost On
    ProxyPass        /inhouse/digisutrasolutions.com http://127.0.0.1:3105/inhouse/digisutrasolutions.com
    ProxyPassReverse /inhouse/digisutrasolutions.com http://127.0.0.1:3105/inhouse/digisutrasolutions.com

    <Location /inhouse/digisutrasolutions.com>
        # Staging must never be indexed (the app also sends noindex).
        Header set X-Robots-Tag "noindex, nofollow"
    </Location>
